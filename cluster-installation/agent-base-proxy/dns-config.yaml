apiVersion: v1
kind: ServiceAccount
metadata:
  name: dns
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dns-scc-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:anyuid
subjects:
  - kind: ServiceAccount
    name: dns
---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: coe-bridge-2001-3
spec:
  config: |-
    {
        "cniVersion": "0.3.1",
        "name": "coe-bridge-2001-3",
        "type": "bridge",
        "bridge": "coe-bridge",
        "ipam":{
          "type": "static",
            "addresses": [
              {
                "address": "192.168.201.3/24"
              }
            ]
        },
        "macspoofchk": false,
        "preserveDefaultVlan": false,
        "vlan": 2001
    }
---
apiVersion: v1
data:
  Corefile: |-
    .:53 {
        file proxy.test.zone proxy.test
        # forward . 10.32.96.1:53 10.32.96.31:53
    }
  proxy.test.zone: |-
    ;
    ; BIND data file for proxy.test
    ;
    $ORIGIN proxy.test.
    $TTL    60
    @       IN      SOA       @ dns.proxy.test. (
                              2021060201 ; Serial
                              60       ; Refresh after 3 hours
                              60       ; Retry after 1 hour
                              60       ; Expire after 1 week
                              60 )     ; Negative caching TTL of 1 day

            IN      NS      dns.proxy.test.

    ; Glue rsecord
    dns.proxy.test. IN A 192.168.201.3

    bastion.proxy.test. IN A 192.168.201.4
    squid.proxy.test. IN A 192.168.201.2

    api IN A 192.168.201.10
    *.apps IN A 192.168.201.11

kind: ConfigMap
metadata:
  name: dns-config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: dns
    app.kubernetes.io/component: dns
    app.kubernetes.io/instance: dns
    app.kubernetes.io/name: dns
    app.kubernetes.io/part-of: dns
    app.openshift.io/runtime: coredns
  name: dns
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: dns
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        k8s.v1.cni.cncf.io/networks: '[ { "name": "coe-bridge-2001-3", "mac": "0E:C0:EF:A8:C9:03",
          "interface": "eth1" } ]'
        openshift.io/required-scc: anyuid
      labels:
        app: dns
        deployment: dns
    spec:
      containers:
        - image: registry.redhat.io/openshift4/ose-coredns-rhel9:v4.21.0
          imagePullPolicy: IfNotPresent
          name: dns
          ports:
            - containerPort: 53
              protocol: TCP
            - containerPort: 53
              protocol: UDP
          resources:
            limits:
              cpu: "1"
              memory: 128Mi
            requests:
              cpu: 500m
              memory: 64Mi
          securityContext:
            runAsUser: 0
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
            - mountPath: /config
              name: dns-config
          workingDir: /config/
      dnsPolicy: ClusterFirst
      nodeSelector:
        beta.kubernetes.io/instance-type: Cisco-UCS-C460-M4
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      serviceAccount: dns
      serviceAccountName: dns
      terminationGracePeriodSeconds: 30
      volumes:
        - configMap:
            defaultMode: 420
            name: dns-config
          name: dns-config
